databases:
  - name: buscacarros-db
    databaseName: buscacarros
    user: buscacarros
    plan: free

services:
  # ─── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: buscacarros-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buscacarros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buscacarros-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_HUNTER
        sync: false
      - key: STRIPE_PRICE_HUNTER_PRO
        sync: false
      - key: STRIPE_PRICE_DEALER
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false
      - key: APP_URL
        sync: false

  # ─── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: buscacarros-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buscacarros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buscacarros-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: EVOLUTION_API_URL
        sync: false
      - key: EVOLUTION_API_KEY
        sync: false

  # ─── Celery Beat (scheduler) ─────────────────────────────────────────────
  - type: worker
    name: buscacarros-beat
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.workers.celery_app beat --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buscacarros-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: buscacarros-redis
          property: connectionString

  # ─── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: buscacarros-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
